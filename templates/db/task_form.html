{% extends "base.html" %}

{% block title %}
  <ul class="list-group">
    <li class="list-group-item"><strong> New Task </strong></li>
  </ul>
{% endblock %}

{% block content %}
    <h1>Create a New Task</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'todolist:home' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
