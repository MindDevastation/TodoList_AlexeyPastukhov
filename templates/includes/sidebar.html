<ul class="sidebar-nav list-group">
  {% if user.is_authenticated %}
    <li class="list-group-item">User: {{ user.username }}</li>
    <li class="list-group-item"><a href="{% url 'logout' %}" class="btn btn-dark">Logout</a></li>
  {% else %}
    <li class="list-group-item">User: None</li>
    <li class="list-group-item"><a href="{% url 'login' %}" class="btn btn-dark">Login</a>
      || <a href="{% url 'todolist:register' %}" class="btn btn-light">Registration</a></li>
  {% endif %}
  <br>
  <li class="list-group-item"><strong> Navigation: </strong></li>
  <br>
  <li class="list-group-item"><a href="{% url 'todolist:home' %}" class="btn btn-light">Home</a></li>
  <li class="list-group-item"><a href="{% url 'todolist:tag-list' %}" class="btn btn-light">Tag List</a></li>
</ul>
